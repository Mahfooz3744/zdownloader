<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZDownloader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 50px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(0, 255, 100, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00ff88, #00cc66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #00ff88;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 16px;
            margin: 15px 0;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ff88;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #00ff44;
            box-shadow: 0 0 15px rgba(0, 255, 100, 0.4);
        }

        select {
            width: 100%;
            padding: 16px;
            margin: 15px 0;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ff88;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(90deg, #00ff88, #00cc66);
            color: black;
            font-size: 1.3rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(0, 255, 100, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 255, 100, 0.5);
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ZDownloader</h1>
        <p class="subtitle">Fast & Clean YouTube Downloader</p>
        
        <form method="POST">
            <input type="text" name="url" placeholder="YouTube link yahan paste karo..." required>
            
            <select name="quality">
                <option value="best">Best Quality (Recommended)</option>
                <option value="1080">1080p Full HD</option>
                <option value="720">720p HD</option>
                <option value="480">480p</option>
            </select>
            
            <button type="submit">Download Now</button>
        </form>

        <div class="footer">
            Made for Personal Use • Fast & Secure <br>
            Love By MD 
        </div>
    </div>
</body>
</html>
